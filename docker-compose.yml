services:
  mysql:
    image: mysql:8.4
    container_name: morrowletter-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: morrowletter
      MYSQL_USER: morrowletter
      MYSQL_PASSWORD: morrowletter
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: morrowletter-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: morrowletter
      DB_USER: morrowletter
      DB_PASSWORD: morrowletter
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
