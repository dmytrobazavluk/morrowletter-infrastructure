services:
  mysql:
    image: mysql:8.4
    container_name: morrowletter-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: morrowletter
      MYSQL_USER: morrowletter
      MYSQL_PASSWORD: morrowletter
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
