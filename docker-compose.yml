services:
  mysql:
    image: mysql:8.4
    container_name: morrowletter-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: morrowletter
      MYSQL_USER: morrowletter
      MYSQL_PASSWORD: morrowletter
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
  backend-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: api-runtime
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: morrowletter
      DB_USER: morrowletter
      DB_PASSWORD: morrowletter
      APP_DISPATCH_DELAY_MINUTES: 2
      APP_DISPATCH_GRANULARITY_MINUTES: 1
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"
  backend-job-dispatch:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: job-runtime
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: morrowletter
      DB_USER: morrowletter
      DB_PASSWORD: morrowletter
      APP_JOB_DB_MAX_POOL_SIZE: "4"
      APP_JOB_DB_MIN_IDLE: "1"
      APP_JOB_DB_CONNECTION_TIMEOUT_MS: "30000"
      APP_JOB_DB_IDLE_TIMEOUT_MS: "600000"
      APP_JOB_DB_MAX_LIFETIME_MS: "1800000"
      APP_JOBS_DISPATCH_ENABLED: "true"
      APP_JOBS_DISPATCH_POLL_INTERVAL_MS: "1000"
      APP_JOBS_DISPATCH_BATCH_SIZE: "100"
      APP_JOBS_CLEANUP_ENABLED: "false"
      APP_DISPATCH_DELAY_MINUTES: 2
      APP_DISPATCH_GRANULARITY_MINUTES: 1
    depends_on:
      mysql:
        condition: service_healthy
  backend-job-cleanup:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: job-runtime
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: morrowletter
      DB_USER: morrowletter
      DB_PASSWORD: morrowletter
      APP_JOB_DB_MAX_POOL_SIZE: "2"
      APP_JOB_DB_MIN_IDLE: "1"
      APP_JOB_DB_CONNECTION_TIMEOUT_MS: "30000"
      APP_JOB_DB_IDLE_TIMEOUT_MS: "600000"
      APP_JOB_DB_MAX_LIFETIME_MS: "1800000"
      APP_JOBS_DISPATCH_ENABLED: "false"
      APP_JOBS_CLEANUP_ENABLED: "true"
      APP_JOBS_CLEANUP_POLL_INTERVAL_MS: "300000"
    depends_on:
      mysql:
        condition: service_healthy
  envoy:
    image: envoyproxy/envoy:v1.33-latest
    container_name: morrowletter-envoy
    restart: unless-stopped
    depends_on:
      - backend-api
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"
